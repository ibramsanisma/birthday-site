<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  color:#fff;
  background: linear-gradient(-45deg,#ff6a88,#ff99ac,#6a11cb,#2575fc);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* container */
.container{
  display:flex;
  width:300vw;
  height:100vh;
  transition: transform 0.9s cubic-bezier(0.77, 0, 0.175, 1);
}

/* pages */
.page{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* card */
.card{
  width:min(92vw,420px);
  padding:32px;
  text-align:center;
  border-radius:24px;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:
    0 0 20px rgba(255,255,255,0.2),
    0 20px 50px rgba(0,0,0,0.3);
  animation: float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

h1{font-size:34px;font-weight:600;}
p{margin-top:10px;opacity:.9;}

button{
  margin-top:18px;
  padding:12px 22px;
  border:none;
  border-radius:999px;
  background:#fff;
  color:#ff4b6e;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:hover{transform:scale(1.08);}
button:active{transform:scale(0.95);}

/* message box */
.message-box{
  margin-top:16px;
  max-height:260px;
  overflow-y:auto;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,.14);
  backdrop-filter: blur(12px);
  line-height:1.6;
  font-size:15px;
  text-align:left;
  white-space:pre-wrap;
}

.message-box::-webkit-scrollbar{width:6px;}
.message-box::-webkit-scrollbar-thumb{
  background:#fff;
  border-radius:10px;
}

/* confetti */
.confetti{
  position:fixed;
  top:-10px;
  width:8px;
  height:8px;
  opacity:.9;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);}
}
</style>
</head>

<body>

<div class="container" id="container">

  <!-- Page 1 -->
  <div class="page">
    <div class="card">
      <h1>Hey 👀</h1>
      <p>I made something for you</p>
      <button onclick="nextPage()">Next ➡️</button>
    </div>
  </div>

  <!-- Page 2 -->
  <div class="page">
    <div class="card">
      <h1>But something before that...</h1>
      <p>I'm really sorry for all these days.</p>
      <button onclick="nextPage()">Continue 💫</button>
    </div>
  </div>

  <!-- Page 3 -->
  <div class="page">
    <div class="card">
      <h1>Happy Birthday ASHA 🎂</h1>
      <div id="msg"></div>
      <button onclick="start()">Open Message 💖</button>
    </div>
  </div>

</div>

<script>
let page = 0;
let started = false;

function nextPage(){
  page = Math.min(page + 1, 2);
  document.getElementById('container').style.transform =
    'translateX(-' + (page * 100) + 'vw)';
}

/* typing */
function typeMessage(text){
  const msg = document.getElementById('msg');
  msg.innerHTML = '<div class="message-box" id="typed"></div>';
  const target = document.getElementById('typed');

  let i = 0;

  function type(){
    if(i < text.length){
      target.textContent += text.charAt(i);
      target.scrollTop = target.scrollHeight;
      i++;
      setTimeout(type, 12);
    }
  }
  type();
}

/* confetti */
function createConfetti(){
  const colors = ['#ff4b6e','#ffd166','#06d6a0','#118ab2','#ffffff'];

  for(let i=0;i<100;i++){
    const c = document.createElement('div');
    c.className = 'confetti';

    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.width = (Math.random()*6+4) + 'px';
    c.style.height = c.style.width;

    const dur = (Math.random()*2 + 2);
    c.style.animationDuration = dur + 's';

    document.body.appendChild(c);
    setTimeout(()=>c.remove(), dur*1000);
  }
}

/* start */
function start(){
  if(started) return;
  started = true;

  const message = `Wishing you a fabulous birthday surrounded by love, joy, and all the things that make you smile. You deserve a great future.

The days I spent with you were so memorable. I still cherish them. I’ve made a lot of promises, and I don’t know if I’ll always be able to keep them. I’m really sorry for that.

You’re one of the best souls I’ve ever met, and I’m truly glad to have you in my life. You are so sweet and sensitive at the same time, and I hope no one ever takes advantage of that.

Even if someone does, I know I won’t stay silent.

I hope I’m always there by your side, and I hope you remember that I’ll always be there for you.

Happy Birthday, Zee.
With love,
Nisma (Azee) 💖`;

  typeMessage(message);
  createConfetti();
}
</script>

</body>
</html>
