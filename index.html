<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #ff758c, #ff7eb3, #6a11cb);
    overflow:hidden;
    color:white;
}

/* floating glow background */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(255,255,255,0.1);
    filter:blur(120px);
    border-radius:50%;
    top:-100px;
    left:-100px;
}

/* main card */
.card{
    position:relative;
    padding:50px;
    border-radius:30px;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align:center;
    max-width:400px;
    animation: float 4s ease-in-out infinite;
}

/* floating animation */
@keyframes float{
    0%,100%{ transform: translateY(0);}
    50%{ transform: translateY(-15px);}
}

h1{
    font-size:42px;
    font-weight:600;
    margin-bottom:15px;
}

p{
    font-size:18px;
    opacity:0.85;
}

/* button */
button{
    margin-top:30px;
    padding:14px 30px;
    border:none;
    border-radius:50px;
    background: linear-gradient(45deg,#ff4b6e,#ff758c);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

button:hover{
    transform: scale(1.1);
    box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

/* typing text */
#msg{
    margin-top:20px;
    min-height:40px;
    font-weight:300;
}

/* confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    opacity:0.8;
    animation: fall linear infinite;
}

@keyframes fall{
    from{ transform: translateY(-100vh) rotate(0deg);}
    to{ transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Happy Birthday 💖</h1>
    <p>Tap to unlock your surprise 🎁</p>
    <button onclick="start()">Open Surprise</button>
    <p id="msg"></p>
</div>

<script>
function typeText(text){
    let i=0;
    let speed=40;
    let msg=document.getElementById("msg");
    msg.innerHTML="";

    function typing(){
        if(i<text.length){
            msg.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }
    }
    typing();
}

function start(){
    typeText("You are literally one of the most amazing people ever 💖✨ Never change. Stay awesome 😌🎂");

    for(let i=0;i<80;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
