<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 🎂</title>

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
}

/* container */
.container{
    display:flex;
    width:300vw;
    transition: transform 0.6s ease-in-out;
}

/* pages */
.page{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    text-align:center;
}

/* button */
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    margin-top:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="container">

    <!-- Page 1 -->
    <div class="page">
        <h1>Hey 👀</h1>
        <p>I made something for you</p>
        <button onclick="nextPage()">Next</button>
    </div>

    <!-- Page 2 -->
    <div class="page">
        <h1>But something before that..</h1>
        <p>I'm really sorry for all these days.</p>
        <button onclick="nextPage()">Next</button>
    </div>

    <!-- Page 3 -->
    <div class="page">
        <h1>Happy Birthday ASHA 🎂</h1>
        <p id="msg"></p>
        <button onclick="start()">Open</button>
    </div>

</div>

<script>
let page = 0;

function nextPage(){
    page++;
    document.getElementById("container").style.transform =
        "translateX(-" + page + "00vw)";
}

function start(){
    document.getElementById("msg").innerHTML = `
Wishing you a fabulous birthday surrounded by love, joy, and all the things that make you smile. You deserve a great future.

The days I spent with you were so memorable. I still cherish them. I’ve made a lot of promises, and I don’t know if I’ll always be able to keep them. I’m really sorry for that.

You’re one of the best souls I’ve ever met, and I’m truly glad to have you in my life. You are so sweet and sensitive at the same time, and I hope no one ever takes advantage of that.

Even if someone does, I know I won’t stay silent.

I hope I’m always there by your side, and I hope you remember that I’ll always be there for you.

Happy Birthday, Zee.
With love,
Nisma (Azee) 💖
`;
}
</script>

</body>
</html>
