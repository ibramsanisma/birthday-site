<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    background: linear-gradient(-45deg, #ff6a88, #ff99ac, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* animated gradient */
@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* glowing particles */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    from{ transform: translateY(100vh);}
    to{ transform: translateY(-10vh);}
}

/* card */
.card{
    position:relative;
    padding:50px;
    border-radius:30px;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align:center;
    max-width:420px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{ transform: translateY(0);}
    50%{ transform: translateY(-15px);}
}

h1{
    font-size:42px;
    font-weight:600;
}

p{
    margin-top:10px;
    font-size:18px;
    opacity:0.85;
}

/* button */
button{
    margin-top:30px;
    padding:14px 30px;
    border:none;
    border-radius:50px;
    background: linear-gradient(45deg,#ff4b6e,#ff758c);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button:hover{
    transform: scale(1.1);
}

/* typing text */
#msg{
    margin-top:20px;
    min-height:40px;
}

/* confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    animation: fall linear infinite;
}

@keyframes fall{
    from{ transform: translateY(-100vh) rotate(0deg);}
    to{ transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Happy Birthday 💖</h1>
    <p>Tap to unlock your surprise 🎁</p>
    <button onclick="start()">Open Surprise</button>
    <p id="msg"></p>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
/* typing effect */
function typeText(text){
    let i=0;
    let msg=document.getElementById("msg");
    msg.innerHTML="";

    function typing(){
        if(i<text.length){
            msg.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,40);
        }
    }
    typing();
}

/* main action */
function start(){
    document.getElementById("music").play();

    typeText("You’re not just special… you’re unforgettable 💖✨ Hope your day is magical 🎂");

    for(let i=0;i<80;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(c);
    }
}

/* particles */
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
