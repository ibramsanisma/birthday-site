<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 🎂</title>

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
}

/* container */
.container{
    display:flex;
    width:300vw;
    transition: transform 0.6s ease-in-out;
}

/* pages */
.page{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    text-align:center;
}

/* button */
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    margin-top:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="container">

    <!-- Page 1 -->
    <div class="page">
        <h1>Hey 👀</h1>
        <p>I made something for you</p>
        <button onclick="nextPage()">Next</button>
    </div>

    <!-- Page 2 -->
    <div class="page">
        <h1>Wait 😏</h1>
        <p>You are really special 💖</p>
        <button onclick="nextPage()">Next</button>
    </div>

    <!-- Page 3 -->
    <div class="page">
        <h1>Happy Birthday 🎂</h1>
        <p id="msg"></p>
        <button onclick="start()">Open</button>
    </div>

</div>

<audio id="music">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
let page = 0;

function nextPage(){
    page++;
    document.getElementById("container").style.transform =
        "translateX(-" + page + "00vw)";
}

function start(){
    document.getElementById("music").play();
    document.getElementById("msg").innerHTML =
        "You are amazing 💖✨ Have the best birthday!";
}
</script>

</body>
</html>
