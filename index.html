<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 🎉</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
        }
        h1 {
            margin-top: 100px;
            font-size: 50px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: black;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Happy Birthday 💖</h1>
    <p id="msg">Click below 🎁</p>

    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML =
            "You’re amazing! Have the best birthday ever 🎂✨";
        }
    </script>

</body>
</html>
